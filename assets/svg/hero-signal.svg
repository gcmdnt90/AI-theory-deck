<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <!-- faint dot-grid substrate -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#d9e1ea"/>
    </pattern>
    <!-- glow filters -->
    <filter id="glowAmber" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fadeUp" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#fbfaf6" stop-opacity="0"/>
      <stop offset="1" stop-color="#fbfaf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="720" fill="#fbfaf6"/>
  <rect width="1280" height="720" fill="url(#dots)" opacity="0.5"/>

  <!-- drifting token-pills: entropy resolving into language, fading upward -->
  <g filter="url(#glowSoft)" opacity="0.95">
    <!-- cyan + violet pills scattered, denser low, sparse high -->
    <g fill="none" stroke-width="2">
      <rect x="250" y="300" width="46" height="20" rx="10" stroke="#1597b5" opacity="0.35"/>
      <rect x="360" y="250" width="40" height="20" rx="10" stroke="#8366c8" opacity="0.25"/>
      <rect x="520" y="210" width="52" height="20" rx="10" stroke="#1597b5" opacity="0.20"/>
      <rect x="690" y="170" width="38" height="20" rx="10" stroke="#8366c8" opacity="0.16"/>
      <rect x="300" y="380" width="50" height="22" rx="11" stroke="#1597b5" opacity="0.6"/>
      <rect x="430" y="350" width="44" height="22" rx="11" stroke="#8366c8" opacity="0.5"/>
      <rect x="600" y="330" width="56" height="22" rx="11" stroke="#1597b5" opacity="0.45"/>
      <rect x="780" y="300" width="46" height="22" rx="11" stroke="#8366c8" opacity="0.4"/>
      <rect x="900" y="260" width="50" height="22" rx="11" stroke="#1597b5" opacity="0.3"/>
      <rect x="990" y="220" width="40" height="20" rx="10" stroke="#8366c8" opacity="0.22"/>
      <rect x="360" y="440" width="58" height="24" rx="12" stroke="#1597b5" opacity="0.85"/>
      <rect x="500" y="420" width="50" height="24" rx="12" stroke="#8366c8" opacity="0.8"/>
      <rect x="660" y="430" width="60" height="24" rx="12" stroke="#1597b5" opacity="0.7"/>
      <rect x="830" y="410" width="48" height="24" rx="12" stroke="#8366c8" opacity="0.65"/>
      <rect x="970" y="390" width="56" height="24" rx="12" stroke="#1597b5" opacity="0.55"/>
      <rect x="1080" y="350" width="44" height="22" rx="11" stroke="#8366c8" opacity="0.4"/>
    </g>
  </g>

  <!-- the signal waveform sweeping across the lower third -->
  <path filter="url(#glowAmber)" fill="none" stroke="#e3a12f" stroke-width="3"
        stroke-linecap="round"
        d="M -20 560
           C 120 560, 150 470, 230 470
           S 330 600, 410 560
           S 500 430, 560 520
           S 650 600, 720 540
           S 820 460, 890 540
           S 990 610, 1060 540
           S 1180 500, 1300 520"/>

  <!-- node markers riding the wave -->
  <g filter="url(#glowAmber)" fill="#e3a12f">
    <circle cx="230" cy="470" r="5"/>
    <circle cx="560" cy="520" r="5"/>
    <circle cx="890" cy="540" r="5"/>
  </g>

  <!-- paper fade so pills stay airy near the top -->
  <rect x="0" y="0" width="1280" height="420" fill="url(#fadeUp)"/>

  <!-- micro caption (optional, remove if used purely as background) -->
  <text x="64" y="678" fill="#6b7788" font-size="18" letter-spacing="3" font-family="JetBrains Mono, monospace">SIGNAL → LANGUAGE · H = −Σ p log p</text>
</svg>
