<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="dots2" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#d9e1ea"/>
    </pattern>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ga" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="chev" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M1 1 L6 5 L1 9" fill="none" stroke="#e3a12f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#fbfaf6"/>
  <rect width="1280" height="720" fill="url(#dots2)" opacity="0.5"/>

  <!-- ===== AROUND THE MODEL (violet scaffolding) ===== -->
  <text x="64" y="80" fill="#8366c8" font-size="26" font-weight="700" letter-spacing="1">around the model</text>
  <text x="64" y="108" fill="#6b7788" font-size="16" font-family="JetBrains Mono, monospace">scaffolding · no new weights</text>

  <!-- outer agent loop -->
  <ellipse cx="640" cy="380" rx="500" ry="270" fill="none" stroke="#8366c8" stroke-width="1.5" stroke-dasharray="3 9" opacity="0.55"/>

  <!-- around nodes -->
  <g filter="url(#g)">
    <g>
      <rect x="120" y="300" width="150" height="62" rx="14" fill="#ffffff" stroke="#8366c8" stroke-width="1.6"/>
      <text x="195" y="337" fill="#243044" font-size="19" text-anchor="middle">Planner</text>
    </g>
    <g>
      <rect x="120" y="430" width="150" height="62" rx="14" fill="#ffffff" stroke="#8366c8" stroke-width="1.6"/>
      <text x="195" y="467" fill="#243044" font-size="19" text-anchor="middle">Tools</text>
    </g>
    <g>
      <rect x="1010" y="300" width="150" height="62" rx="14" fill="#ffffff" stroke="#8366c8" stroke-width="1.6"/>
      <text x="1085" y="337" fill="#243044" font-size="19" text-anchor="middle">Memory</text>
    </g>
    <g>
      <rect x="1010" y="430" width="150" height="62" rx="14" fill="#ffffff" stroke="#8366c8" stroke-width="1.6"/>
      <text x="1085" y="467" fill="#243044" font-size="19" text-anchor="middle">Observe</text>
    </g>
  </g>

  <!-- ===== INSIDE THE MODEL (cyan boundary) ===== -->
  <g filter="url(#g)">
    <rect x="430" y="210" width="420" height="340" rx="22" fill="#ffffff" stroke="#1597b5" stroke-width="2"/>
  </g>
  <text x="640" y="195" fill="#1597b5" font-size="26" font-weight="700" letter-spacing="1" text-anchor="middle">inside the model</text>
  <text x="640" y="540" fill="#6b7788" font-size="15" font-family="JetBrains Mono, monospace" text-anchor="middle">in the weights · changed only by training</text>

  <!-- inside nodes -->
  <g filter="url(#g)" font-size="18" text-anchor="middle">
    <g>
      <rect x="468" y="248" width="160" height="56" rx="12" fill="#ffffff" stroke="#1597b5" stroke-width="1.5"/>
      <text x="548" y="282" fill="#243044">Embeddings</text>
    </g>
    <g>
      <rect x="652" y="248" width="160" height="56" rx="12" fill="#ffffff" stroke="#1597b5" stroke-width="1.5"/>
      <text x="732" y="282" fill="#243044">Attention</text>
    </g>
    <g>
      <rect x="468" y="330" width="160" height="56" rx="12" fill="#ffffff" stroke="#1597b5" stroke-width="1.5"/>
      <text x="548" y="364" fill="#243044">MoE / FFN</text>
    </g>
    <g>
      <rect x="652" y="330" width="160" height="56" rx="12" fill="#ffffff" stroke="#1597b5" stroke-width="1.5"/>
      <text x="732" y="364" fill="#243044">Reasoning*</text>
    </g>
    <g>
      <rect x="560" y="430" width="160" height="52" rx="12" fill="#ffffff" stroke="#1597b5" stroke-width="1.5"/>
      <text x="640" y="462" fill="#243044">next token</text>
    </g>
  </g>

  <!-- amber active path: tools -> model -> observe -> memory (the loop) -->
  <g fill="none" stroke="#e3a12f" stroke-width="2.2" filter="url(#ga)" marker-end="url(#chev)">
    <path d="M270 461 C 360 461, 380 460, 428 460"/>
    <path d="M850 458 C 920 458, 950 460, 1006 460"/>
    <path d="M1085 428 C 1085 400, 1085 380, 1085 364"/>
    <path d="M1010 331 C 940 331, 900 330, 852 330"/>
  </g>

  <!-- the test: caption -->
  <text x="640" y="660" fill="#e3a12f" font-size="20" text-anchor="middle" font-weight="600">The test: does it change the weights?  inside · else  around</text>
  <text x="852" y="372" fill="#6b7788" font-size="12" font-family="JetBrains Mono, monospace">* trained, not prompted</text>
</svg>
