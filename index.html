<!-- ===== 05-behaviour-control.html ===== -->
<section>

  <section class="module-cover" data-background-image="assets/img/module-05-behaviour-control.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">05</span>
    <p class="kicker">Modulo 5</p>
    <h1>Controllo del comportamento</h1>
    <p class="lede">Guidare un agente col linguaggio naturale: istruzioni, skill e strumenti.</p>
    <aside class="notes">
      Riformula la programmazione per questo pubblico: il comportamento si plasma per lo più
      scrivendo prosa, non codice. Il Markdown è il substrato. I nomi dei file variano per vendor;
      il principio è generale.
    </aside>
  </section>

  <section>
    <h2>La prosa guida il comportamento</h2>
    <div class="cols">
      <div class="col" style="font-size:.82em;">
        <p>Gli agenti vengono guidati su due livelli: <strong>file di istruzioni persistenti</strong> e <strong>prompt del compito corrente</strong>.</p>
        <p>CO-STAR struttura quel prompt: Contesto, Obiettivo, Stile, Tono, Audience, Risposta.</p>
        <div class="caption-row control-captions" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Regole persistenti</strong><span>Vincoli riutilizzabili: sicurezza, fonti, vocabolario e convenzioni del progetto.</span></div>
          <div class="mini-card"><strong>Prompt del compito · CO-STAR</strong><span>Obiettivo e contesto, più stile, tono, pubblico e formato della risposta desiderati.</span></div>
          <div class="mini-card"><strong>Connessi, non identici</strong><span>CO-STAR plasma una richiesta; i file di istruzioni guidano molte richieste nel tempo.</span></div>
        </div>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m05-prose-stack.png" alt="Fogli di istruzioni a strati che guidano il segnale di comportamento di un agente">
      </div>
    </div>
    <p class="sources"><strong>Fonte:</strong> <a href="https://www.tech.gov.sg/technews/mastering-the-art-of-prompt-engineering-with-empower/">GovTech Singapore, framework CO-STAR</a> (2025).</p>
    <aside class="notes">
      CO-STAR è davvero collegato, ma è uno scaffold per il prompt e non un modello completo della
      configurazione persistente di un agente. Insisti sul principio più che sul marchio: entrambi
      rendono la prosa esplicita, rivedibile e riutilizzabile, ma su scale diverse.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2>Perché il Markdown?</h2>
    <div class="cols">
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Leggibile</h4><p>Umani e modelli riescono a interpretarlo.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-cyan);"><h4>Diff-abile</h4><p>I cambi di comportamento compaiono in git.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Strutturato</h4><p>Titoli ed elenchi danno segnali salienti.</p></div>
      </div>
      <div class="col visual-frame">
        <div class="layered-file">
          <div class="rule"># Regole persistenti</div>
          <div>- cita fonti primarie</div>
          <div>- mai nascondere l'incertezza</div>
          <br>
          <div class="context">## Prompt del compito · CO-STAR</div>
          <div>- Contesto: lezione di teoria AI</div>
          <div>- Obiettivo: spiegare il RAG</div>
          <div>- Stile: esempi concreti</div>
          <div>- Tono: conciso, scettico</div>
          <div>- Audience: ricercatori STEM</div>
          <div>- Risposta: 3 punti + diagramma</div>
          <br>
          <div class="comment"># il comportamento ora è rivedibile</div>
        </div>
      </div>
    </div>
    <aside class="notes">
      Per i ricercatori: questa è specifica-come-documentazione. L'artefatto che controlla l'agente è
      lo stesso artefatto che un collega legge per capirlo.
    </aside>
  </section>

  <section>
    <h2>Skill - competenza impacchettata</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.78em;">
        <p>Una <strong>skill</strong> è un pacchetto di capacità riutilizzabile. Dice all'agente quando caricare istruzioni, script e risorse aggiuntive.</p>
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Struttura</h4><p><code>name</code>, <code>description</code>, regole di attivazione, istruzioni, script/risorse opzionali.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Attivata dall'intento</h4><p>La description è la superficie di match: "fai il debug" carica la diagnosi; "grill me" carica un flusso di critica.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);"><h4>Esempi</h4><p><code>grill-with-docs</code>, <code>caveman</code>, <code>personas</code>, <code>skill-creator</code>.</p></div>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m05-skill-structure.png" alt="Pacchetto skill con manifest, trigger, istruzioni, script e risorse">
      </div>
    </div>
    <aside class="notes">
      Skill = modularità per il comportamento. Buon punto per menzionare che questo stesso progetto
      usa le skill.
    </aside>
  </section>

  <section>
    <h2>Strumenti - azioni che il modello può compiere</h2>
    <div class="cols">
      <div class="col stack-sm">
        <p style="font-size:.72em;">Uno strumento è procedurale: l'agente compila un input tipizzato, gira codice esterno, poi il risultato torna nel contesto.</p>
        <pre><code class="language-json" data-trim>{
  "name": "read_pdf",
  "description": "Estrae testo e tabelle",
  "input_schema": {
    "file": "path",
    "pages": "range"
  }
}</code></pre>
        <div class="caption-row" style="grid-template-columns:1fr 1fr;">
          <div class="mini-card"><strong>Formati</strong><span>PDF, XLSX, DOCX, PPTX, CSV, immagini, audio.</span></div>
          <div class="mini-card"><strong>Risultato</strong><span>Il contenuto interpretato torna come contesto strutturato su cui il modello può ragionare.</span></div>
        </div>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m05-tools-file-formats.png" alt="Chiamate a strumenti procedurali che aprono formati di file come PDF, fogli di calcolo e documenti">
      </div>
    </div>
    <p class="footnote">Le skill plasmano come l'agente si comporta. Gli strumenti gli danno procedure e accesso ai formati di file.</p>
    <aside class="notes">
      Lo schema è il contratto. Anticipa MCP come il modo standard di esporre strumenti fra sistemi.
    </aside>
  </section>

</section>


<!-- ===== 06-mcp-connectors.html ===== -->
<section>

  <section class="module-cover" data-background-image="assets/img/module-06-mcp-connectors.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">06</span>
    <p class="kicker">Modulo 6</p>
    <h1>MCP &amp; connettori</h1>
    <p class="lede">Come un agente raggiunge il mondo esterno: una presa standard, non cablaggi su misura.</p>
    <aside class="notes">
      Questo risponde a "come tocca i miei file, il calendario o il database?" Inquadra MCP come
      l'USB-C degli strumenti agentici: un protocollo invece di N integrazioni custom.
    </aside>
  </section>

  <section>
    <h2>Perché un protocollo condiviso?</h2>
    <p style="font-size:.8em;">Se <strong>M assistenti</strong> devono connettersi a <strong>N strumenti</strong>, il cablaggio su misura può richiedere fino a <strong>M × N integrazioni specifiche per coppia</strong>. Un protocollo condiviso offre un'unica interfaccia comune.</p>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m06-mxn-convention.png" alt="Agenti e server che scambiano buste di messaggi comuni attraverso un'unica corsia di protocollo condiviso">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>M assistenti × N strumenti</strong><span>Ogni coppia può altrimenti richiedere codice-colla su misura: da qui “M × N”.</span></div>
        <div class="mini-card"><strong>Con MCP</strong><span>Agenti e server parlano la stessa grammatica richiesta/risposta.</span></div>
        <div class="mini-card"><strong>Non sono dati condivisi</strong><span>MCP muove richieste, risultati e descrizioni di capacità; non fonde gli archivi di dati.</span></div>
      </div>
    </div>
    <aside class="notes">
      Definisci la notazione a voce: M applicazioni client per N server di strumenti. Il titolo ora è
      in linguaggio semplice; M × N resta nel corpo come motivo per cui uno standard riduce il lavoro.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2>Model Context Protocol</h2>
    <div class="cols">
      <div class="col" style="font-size:.8em;">
        <p>Uno standard aperto in cui un <strong>host</strong> si connette a server che espongono capacità in modo uniforme.</p>
        <p>MCP standardizza la busta intorno a chiamate di strumenti, risorse e template di prompt, così un agente può scoprire cosa offre un server.</p>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m06-mcp-primitives.png" alt="Host MCP connesso a scaffali di capacità: strumenti, risorse e template di prompt">
      </div>
    </div>
    <div class="quote-strip">
      <blockquote>"open standard for connecting AI assistants"<cite>Annuncio di Anthropic</cite></blockquote>
      <blockquote>"standardizes how applications provide context"<cite>Introduzione a MCP</cite></blockquote>
    </div>
    <p class="sources"><strong>Fonti:</strong> <a href="https://www.anthropic.com/news/model-context-protocol">Annuncio MCP di Anthropic</a>; <a href="https://modelcontextprotocol.io/docs/getting-started/intro">Introduzione a MCP</a>; <a href="https://modelcontextprotocol.io/docs/learn/architecture">Architettura MCP</a>.</p>
    <aside class="notes">
      Ricollega al Modulo 5: strumenti, risorse e template di prompt possono essere serviti su un
      protocollo condiviso e riusati da agenti conformi.
    </aside>
  </section>

  <section>
    <h2>I connettori in pratica</h2>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m06-connectors-runtime.png" alt="Runtime di un agente che chiama un connettore che raggiunge file, fogli di calcolo, documenti, database e API attraverso confini di permesso">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>Scopri</strong><span>Il connettore pubblicizza strumenti, risorse e schemi disponibili.</span></div>
        <div class="mini-card"><strong>Chiama</strong><span>L'agente invia una richiesta strutturata attraverso il protocollo.</span></div>
        <div class="mini-card"><strong>Restituisci</strong><span>Il connettore restituisce risultati che diventano nuovo contesto per il modello.</span></div>
      </div>
    </div>
    <div class="takeaway">I connettori sono il punto in cui un chatbot diventa un collega che fa le cose.</div>
    <p class="footnote">Le stesse domande di sicurezza di qualunque integrazione: credenziali, ambito e fiducia.</p>
    <aside class="notes">
      Chiudi sul salto di capacità, ma pianta il seme del rischio: ogni connettore è anche una
      superficie d'attacco. Passaggio diretto al Modulo 8.
    </aside>
  </section>

</section>

  <section>
    <h2>Fantasmi, non animali</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.8em;">
        <p>Il modello mentale di Karpathy: non stiamo costruendo <strong>animali</strong> (pulsioni evolute, senso comune incarnato) — stiamo evocando <strong>fantasmi</strong>: simulazioni statistiche del testo umano.</p>
        <div class="signal-card" style="--card-accent:var(--ait-violet);"><h4>Intelligenza frastagliata</h4><p>La capacità ha picchi dove il training era verificabile ed enfatizzato; ristagna altrove. Non c'è manuale.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Il test dell'autolavaggio</h4><p>Un modello che rifattorizza una codebase da 100.000 righe può consigliare di andare <em>a piedi</em> all'autolavaggio a 50&nbsp;m — senza cogliere che l'auto deve venire con te.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Misurato, non solo percepito</h4><p>Esperimento sul campo, 758 consulenti BCG: l'AI ha alzato la qualità <em>dentro</em> la frontiera e l'ha degradata <em>fuori</em> — su compiti di difficoltà apparente simile.</p></div>
      </div>
      <div class="col vertical-captions">
        <div class="mini-card"><strong>Animali (colleghi)</strong><span>Motivazione intrinseca; si adattano sotto pressione; sanno cosa non sanno.</span></div>
        <div class="mini-card"><strong>Fantasmi (agenti)</strong><span>Completamento di pattern; indifferenti all'urgenza; ciechi con sicurezza al contesto mancante.</span></div>
        <div class="mini-card"><strong>Conseguenza</strong><span>Gestisci con specifica e verifica rigorose, non con delega fiduciaria dell'obiettivo.</span></div>
      </div>
    </div>
    <div class="quote-strip">
      <blockquote>"We're not building animals. We're building ghosts or spirits."<cite>Karpathy, Dwarkesh Podcast (2025)</cite></blockquote>
      <blockquote>"They are jagged, alien tools... be suspicious of the system and figure it out empirically."<cite>Karpathy, AI Ascent (2026)</cite></blockquote>
    </div>
    <p class="sources"><strong>Fonti:</strong> <a href="https://www.dwarkesh.com/p/andrej-karpathy">Intervista Dwarkesh Podcast (ott 2025)</a>; <a href="https://karpathy.bearblog.dev/animals-vs-ghosts/">Karpathy, "Animals vs Ghosts" (2025)</a>; <a href="https://karpathy.bearblog.dev/sequoia-ascent-2026/">Karpathy, riassunto Sequoia AI Ascent (2026)</a>; <a href="https://pubsonline.informs.org/doi/10.1287/orsc.2025.21838">Dell'Acqua, McFowland, Mollick, Lifshitz-Assaf, Kellogg et al., "Navigating the Jagged Technological Frontier" (Organization Science)</a>.</p>
    <aside class="notes">
      Questa è la versione da practitioner del nostro filo anti-antropomorfismo (Modulo 2) e dello
      strato tropo: sotto il comportamento fluente c'è ancora uno stimatore stocastico. L'esempio
      dell'autolavaggio è di Karpathy stesso, dal fireside chat dell'Ascent. Lo studio della
      frontiera (Mollick e colleghi, con BCG) è la controparte peer-reviewed dell'intuizione
      "frastagliata" di Karpathy — stessa forma, misurata: i consulenti che usavano l'AI fuori dalla
      frontiera erano 19 punti <em>meno</em> propensi a essere corretti dei controlli. La metafora di
      Karpathy, i dati di Mollick.
    </aside>
  </section>

  <section class="practice-slide" data-background-color="#f4f8fb">
    <h2>1 — Possiedi la specifica</h2>
    <div class="cols">
      <div class="col" style="font-size:.8em;">
        <p>L'agente riempie i vuoti; <strong>l'umano possiede il piano</strong>. Karpathy: lavora con l'agente per progettare una specifica dettagliata — non delegare l'obiettivo stesso.</p>
        <div class="caption-row" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Obiettivo, non compito</strong><span>Dichiara la decisione che il lavoro serve, non solo l'azione ("report" vs "cosa il report deve permetterci di decidere").</span></div>
          <div class="mini-card"><strong>Fatti torchiare</strong><span>Pocock inverte il colloquio: l'agente interroga <em>te</em> finché la specifica non regge alle domande — le assunzioni emergono invece di essere indovinate in silenzio.</span></div>
          <div class="mini-card"><strong>Itera, niente waterfall</strong><span>Piccole fette delimitate con checkpoint; un unico prompt gigante massimizza la deriva — e tiene il contesto fuori dalla "zona stupida" degradata del modello.</span></div>
        </div>
      </div>
      <div class="col" style="font-size:.8em;">
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Storia ammonitrice: il bug Stripe</h4><p>L'agente di Karpathy abbinava pagamenti ad account per <em>indirizzo email</em> invece che per ID utente persistente. Codice plausibile, design di sistema sbagliato — solo il giudizio umano lo coglie.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Chi fa cosa</h4><p>"Tu sei responsabile della supervisione e delle categorie di alto livello. Gli agenti fanno gran parte del lavoro sottostante."</p></div>
      </div>
    </div>
    <p class="footnote">Il repository stesso di questo deck è costruito con skill di grill/specifica — il metodo insegna se stesso.</p>
    <p class="sources"><strong>Fonti:</strong> <a href="https://karpathy.bearblog.dev/sequoia-ascent-2026/">Karpathy, riassunto Sequoia AI Ascent (2026)</a>; <a href="https://www.youtube.com/watch?v=96jN2OCOfLs">video del fireside chat</a>; <a href="https://www.aihero.dev/posts">Pocock, AI Hero</a>; <a href="https://www.youtube.com/watch?v=-QFHIoCo-Ko">Pocock, "Workflow for AI Coding", AI Engineer (2026)</a>.</p>
    <aside class="notes">
      Ricollega al Modulo 5: la specifica è la prosa-come-programma applicata a un singolo pezzo di
      lavoro. L'esempio email Stripe/Google è testuale dal talk di Karpathy — ottimo per i
      ricercatori: l'output del modello era localmente plausibile e globalmente sbagliato. Il flusso
      "grill" di Pocock è lo stesso strato della proprietà della specifica di Karpathy, trasformato
      in skill riutilizzabile; la sua osservazione "smart/dumb zone" (il ragionamento degrada mentre
      la finestra si riempie) riecheggia il Lost-in-the-Middle del Modulo 4. Cita Pocock come
      pratica, non come evidenza — metodo da practitioner, non affermazione peer-reviewed.
    </aside>
  </section>

  <section class="practice-slide">
    <h2>2 — Costruisci un loop di verifica</h2>
    <div class="cols">
      <div class="col" style="font-size:.8em;">
        <p>La tesi dell'automazione di Karpathy: il software tradizionale automatizza ciò che puoi <strong>specificare</strong>; gli LLM automatizzano ciò che puoi <strong>verificare</strong>. Quindi rendi verificabile il tuo lavoro.</p>
        <div class="caption-row" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Prima i criteri…</strong><span>Definisci un successo misurabile prima della generazione — struttura, conteggi, controlli — non "rendilo leggibile".</span></div>
          <div class="mini-card"><strong>…ma aspettati la deriva dei criteri</strong><span>Shankar et al.: valutare output reali <em>cambia</em> i tuoi criteri — la valutazione è un loop che affila la specifica, non un cancello una-tantum.</span></div>
          <div class="mini-card"><strong>Critico indipendente</strong><span>Fai auditare l'output a un secondo modello o a un contesto fresco; il controinterrogatorio espone i punti ciechi.</span></div>
          <div class="mini-card"><strong>Verità esterna</strong><span>Test, log, documenti di riferimento — mai la sola autovalutazione del modello.</span></div>
        </div>
      </div>
      <div class="col stack-sm">
        <div class="quote-strip" style="grid-template-columns:1fr;">
          <blockquote>"Give Claude a way to verify its work. If Claude has that feedback loop, it will 2-3x the quality of the final result."<cite>Boris Cherny, creatore di Claude Code (2026)</cite></blockquote>
        </div>
        <div class="takeaway" style="font-size:.8em;">La verifica è da dove viene la qualità — il generatore costa poco, il controllo è il mestiere.</div>
      </div>
    </div>
    <p class="sources"><strong>Fonti:</strong> <a href="https://karpathy.bearblog.dev/verifiability/">Karpathy, "Verifiability" (2025)</a>; <a href="https://karpathy.bearblog.dev/sequoia-ascent-2026/">riassunto Sequoia AI Ascent (2026)</a>; <a href="https://x.com/bcherny/status/2007179861115511237">Cherny sui loop di verifica (X, 2026)</a>; <a href="https://doi.org/10.1145/3654777.3676450">Shankar et al., "Who Validates the Validators?" (UIST 2024)</a>.</p>
    <aside class="notes">
      La tesi della verificabilità spiega anche la frastagliatura (perché codice e matematica corrono
      avanti). Per il lavoro non di codice: fornisci documenti esemplari come verità di riferimento
      per tono e struttura. Il 2-3x di Cherny è una stima da practitioner, non uno studio
      controllato — dillo. La "deriva dei criteri" di Shankar è peer-reviewed e sottile: le persone
      pensano di conoscere i propri criteri finché non valutano gli output; l'atto di verificare
      raffina cosa significhi "buono". Quindi la specifica (slide 1) e il verificatore (questa
      slide) si alimentano a vicenda — è un unico loop, non una pipeline. L'LLM-come-giudice eredita
      i difetti del giudice; ecco perché l'umano resta nel loop di valutazione.
    </aside>
  </section>

  <section class="practice-slide" data-background-color="#f4f8fb">
    <h2>3 — Investi nell'ambiente</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.8em;">
        <p>Ogni chat vuota azzera il fantasma. L'impalcatura persistente — lo stack <em>intorno</em> dei Moduli 4–6 — è dove l'affidabilità si accumula. Huyen: questa è ormai una disciplina, l'<strong>AI engineering</strong> — costruire su foundation model che non addestri, dove la valutazione porta il peso.</p>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>File di istruzioni</h4><p>Contesto di progetto caricato a ogni sessione (Modulo 5: CLAUDE.md, AGENTS.md — stessa idea).</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-cyan);"><h4>Skill che si accumulano</h4><p>Workflow ripetuto → skill codificata → raffinata a ogni caso limite.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);"><h4>Conoscenza leggibile</h4><p>Documenti locali ben organizzati permettono a un modello generale di agire con accuratezza di dominio.</p></div>
      </div>
      <div class="col" style="font-size:.8em;">
        <p><strong>Guardrail per rischio, non per cortesia.</strong> Le regole in prosa sono suggerimenti che un modello può scavalcare; le azioni ad alto rischio richiedono blocchi deterministici.</p>
        <div class="caption-row" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Fai sempre</strong><span>Routine a basso rischio — gira col pilota automatico via istruzioni.</span></div>
          <div class="mini-card"><strong>Chiedi prima</strong><span>Rischio moderato — conferma obbligatoria prima di agire.</span></div>
          <div class="mini-card"><strong>Mai fare</strong><span>Azioni distruttive — bloccate a livello di strumento, fuori dalla portata del modello.</span></div>
        </div>
      </div>
    </div>
    <p class="footnote">Lo slider di autonomia di Karpathy: scegli tu quanto è lungo il guinzaglio, compito per compito.</p>
    <p class="sources"><strong>Fonti:</strong> <a href="https://www.youtube.com/watch?v=LCEmiRjPEtQ">Karpathy, "Software Is Changing (Again)", YC AI Startup School (2025)</a>; <a href="https://www.anthropic.com/engineering/claude-code-best-practices">Anthropic, best practice di Claude Code (2025)</a>; <a href="https://www.oreilly.com/library/view/ai-engineering/9781098166298/">Huyen, <em>AI Engineering</em> (O'Reilly, 2025)</a>.</p>
    <aside class="notes">
      La tabella dei guardrail a tre livelli anticipa il Modulo 8: le istruzioni in prosa fanno parte
      del contesto, e il contesto può essere manipolato — è esattamente il problema dell'injection.
      I blocchi deterministici vivono fuori dal modello, quindi reggono anche quando il contesto è
      compromesso.
    </aside>
  </section>

  <section class="practice-slide">
    <h2>Delega il pensiero, non la comprensione</h2>
    <div class="quote-strip" style="grid-template-columns:1fr;">
      <blockquote style="font-size:1.05em;">"You can outsource your thinking, but you can't outsource your understanding."<cite>un tweet a cui Karpathy "continua a tornare" — AI Ascent (2026)</cite></blockquote>
    </div>
    <div class="cols" style="font-size:.8em;">
      <div class="col">
        <p>Due posture per restare nel loop — i termini di Mollick, dallo stesso studio sul campo con BCG:</p>
        <div class="caption-row" style="grid-template-columns:1fr 1fr;">
          <div class="mini-card"><strong>Centauro</strong><span>Dividi lungo una cucitura netta: l'umano tiene i compiti di giudizio, l'agente prende quelli di generazione; verifica al confine.</span></div>
          <div class="mini-card"><strong>Cyborg</strong><span>Intreccia a ogni passo: bozza, domanda, redirezione — il loop gira in continuo.</span></div>
        </div>
      </div>
      <div class="col">
        <p>In ogni caso, qualcuno deve sapere <em>cosa vale la pena costruire, quale risultato è sospetto, quale compromesso è accettabile</em>. La regola di Mollick: <strong>sii l'umano nel loop</strong>.</p>
        <p>Quel qualcuno è il livello macro del nostro quadro a tre livelli: il giudizio non si automatizza via; diventa il collo di bottiglia — e il valore.</p>
      </div>
    </div>
    <div class="takeaway">Migliore è il fantasma, più il mestiere dell'umano è capire.</div>
    <p class="sources"><strong>Fonti:</strong> <a href="https://karpathy.bearblog.dev/sequoia-ascent-2026/">Karpathy, riassunto Sequoia AI Ascent (2026)</a>; <a href="https://pubsonline.informs.org/doi/10.1287/orsc.2025.21838">Dell'Acqua et al. (Organization Science)</a>; Mollick, <em>Co-Intelligence</em> (Portfolio, 2024).</p>
    <aside class="notes">
      L'attribuzione conta: Karpathy dice esplicitamente che è un tweet che continua a citare, non un
      suo conio — modella l'igiene delle citazioni che predichiamo. Centauro/cyborg: stili di lavoro
      osservati nei consulenti dell'esperimento della frontiera frastagliata; resi popolari nel
      Co-Intelligence di Mollick, le cui regole includono "invita sempre l'AI al tavolo", "sii
      l'umano nel loop" e "assumi che questa sia la peggiore AI che userai mai". Passaggio al
      Modulo 8: cosa succede quando l'umano *non* è nel loop e il contesto è ostile.
    </aside>
  </section>

</section>

<section>

  <section class="module-cover" data-background-image="assets/img/module-07-security-risks.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">08</span>
    <p class="kicker">Modulo 8</p>
    <h1>Sicurezza &amp; rischi</h1>
    <p class="lede">Tre strati di fallimento: il modello, l'utente e i dati.</p>
    <aside class="notes">
      Organizza il modulo su tre proprietari del rischio: modello, utente e dati. Questa struttura
      deve restare anche se dimenticano i singoli esempi.
    </aside>
  </section>

  <section>
    <h2><span class="chip risk">modello</span> Cosa sbaglia il modello</h2>
    <div class="cols c-3">
      <div class="signal-card" style="--card-accent:var(--ait-amber);">
        <h4>Allucinazione</h4>
        <p>Fluente, sicura, falsa.</p>
      </div>
      <div class="signal-card" style="--card-accent:var(--ait-red);">
        <h4>Bias</h4>
        <p>Distorsioni dei dati di training trasportate negli output.</p>
      </div>
      <div class="signal-card" style="--card-accent:var(--ait-violet);">
        <h4>Sicofantismo</h4>
        <p>Dare ragione all'utente invece di essere corretti.</p>
      </div>
    </div>
    <div class="visual-frame generated-flow-frame risk-sources-frame" style="margin-top:.8em;" role="img" aria-label="Meccanismi di rischio del modello: sampling, dati di training, segnali di feedback">
      <img src="assets/img/m07-risk-mechanisms-v2.png" alt="">
      <span class="flow-label risk-sampling">sampling</span>
      <span class="flow-label risk-data">dati di training</span>
      <span class="flow-label risk-feedback">segnali di feedback</span>
    </div>
    <p class="footnote">Tutti e tre risalgono al Modulo 2: il modello ottimizza testo plausibile, non verità.</p>
    <p class="sources"><strong>Fonti:</strong> Ji et al. (2023); Perez et al. (2022); Sharma et al. (2023).</p>
    <aside class="notes">
      Collega causalmente al motore: l'allucinazione è campionare da una distribuzione senza oracolo
      di verità. Gestibile, ma non eliminabile.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2><span class="chip risk">utente</span> Cosa succede a noi</h2>
    <div class="cols">
      <div class="col visual-frame tight">
        <img src="assets/img/cognitive-delegation.png" alt="Silhouette umana che passa un filo ambrato di pensiero a una parentesi-macchina">
      </div>
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-green);">
          <h4>Delega cognitiva</h4>
          <p>Scaricare il pensiero può erodere la competenza che si sta scaricando.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);">
          <h4>Trappola della fluidità</h4>
          <p>Un output rifinito sembra più accurato di quanto sia.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);">
          <h4>Rischio camera dell'eco</h4>
          <p>Sistemi di raccomandazione e social possono amplificare credenze familiari e disinformazione.</p>
        </div>
      </div>
    </div>
    <p class="sources"><strong>Fonti:</strong> Risko &amp; Gilbert (2016); Sparrow, Liu &amp; Wegner (2011); Lee &amp; See (2004); Lee et al. (2025); Del Vicario et al. (2016); Cinelli et al. (2021).</p>
    <aside class="notes">
      La slide più rilevante per un pubblico accademico preoccupato per gli studenti. Il rischio non
      è solo una risposta sbagliata; è la lenta atrofia della capacità di accorgersene.
    </aside>
  </section>

  <section>
    <h2><span class="chip risk">dati</span> Dove i dati perdono</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.74em;">
        <div class="signal-card" style="--card-accent:var(--ait-cyan);"><h4>Cloud vs locale</h4><p>Chi può vedere i prompt e i dati caricati?</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-red);"><h4>Prompt injection</h4><p>Testo non fidato diventa un'istruzione.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Esposizione di segreti</h4><p>Corpora RAG e credenziali diventano bersagli.</p></div>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m07-data-leaks.png" alt="Prompt injection indiretta che dirotta il percorso degli strumenti di un agente causando movimenti di dati indesiderati">
      </div>
    </div>
    <div class="takeaway">Il salto pericoloso è quando il testo non fidato smette di essere dato e inizia a guidare un'azione.</div>
    <p class="sources"><strong>Fonti:</strong> Greshake et al. (2023); OWASP Top 10 for LLM Applications.</p>
    <aside class="notes">
      Insisti sul fatto che i connettori allargano la superficie d'attacco: l'agente ora agisce su
      input non fidato. La prompt injection non ha ancora una soluzione pulita; progetta per il
      minimo privilegio.
    </aside>
  </section>

  <!-- 1) Decide language and inject the matching deck BEFORE Reveal/widgets run.
       document.documentElement.lang is read by theory-widgets.js, so it must be
       set here first. -->
  <script>
    (function () {
      var DEFAULT_LANG = 'it'; // change to 'en' to publish English by default
      var lang = (localStorage.getItem('deck-lang') || DEFAULT_LANG).toLowerCase();
      if (lang !== 'en' && lang !== 'it') lang = 'en';
      document.documentElement.lang = lang;
      var tpl = document.getElementById('deck-' + lang);
      var slides = document.querySelector('.reveal .slides');
      if (tpl && slides) slides.innerHTML = tpl.innerHTML;
      // Free the memory of both templates once the active one is live.
      var other = document.getElementById('deck-' + (lang === 'en' ? 'it' : 'en'));
      if (tpl) tpl.remove();
      if (other) other.remove();

      document.addEventListener('DOMContentLoaded', function () {
        var btns = document.querySelectorAll('#lang-toggle button');
        Array.prototype.forEach.call(btns, function (b) {
          b.setAttribute('aria-pressed', String(b.dataset.lang === lang));
          b.addEventListener('click', function () {
            if (b.dataset.lang === lang) return;
            localStorage.setItem('deck-lang', b.dataset.lang);
            // Reload: Reveal keeps the slide number in the URL hash, so the
            // other language opens on the very same slide.
            location.reload();
          });
        });
      });
    })();
  </script>
