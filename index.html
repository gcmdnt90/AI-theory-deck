<!-- ===== 01-history.html ===== -->
<section>

  <section class="module-cover" data-background-image="assets/img/module-01-history.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">01</span>
    <p class="kicker">Module 1</p>
    <h1>A history of NLP</h1>
    <p class="lede">From language entropy to the Transformer, to agents, to world models.</p>
    <aside class="notes">
      Thesis: the "new" idea behind LLMs is old. Shannon framed language as a stochastic process in
      1948. What changed was scale, data and architecture.
    </aside>
  </section>

  <section>
    <h2>1948 - Language as a stochastic process</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.82em;">
        <p>Claude <strong>Shannon</strong> models text as a source emitting symbols with probabilities.</p>
        <p>Predicting the next symbol = reducing <em>entropy</em>.</p>
        <p>$H = -\sum_i p_i \log_2 p_i$</p>
        <div class="takeaway">Meaning becomes tractable when language has structure.</div>
      </div>
      <div class="col visual-frame tight">
        <img src="assets/img/shannon-signal.png" alt="Amber waveform transforming into token pills">
      </div>
    </div>
    <p class="sources"><strong>Sources:</strong> Shannon (1948) <em>A Mathematical Theory of Communication</em>; Shannon (1951) <em>Prediction and Entropy of Printed English</em>.</p>
    <aside class="notes">
      Make the link explicit: an LLM is a very large learned estimator of Shannon's next-symbol
      distribution. Everything else is engineering around this bet.
    </aside>
  </section>

  <section>
    <h2>Three eras</h2>
    <div class="era-line">
      <div class="era" style="--era-color:var(--ait-amber);">
        <h4>Symbolic</h4>
        <p>Rules and grammars. Clear, brittle, hand-built.</p>
      </div>
      <div class="era" style="--era-color:var(--ait-cyan);">
        <h4>Statistical</h4>
        <p>Counts, n-grams, word2vec. Data starts to beat rules.</p>
      </div>
      <div class="era" style="--era-color:var(--ait-violet);">
        <h4>Neural</h4>
        <p>RNNs, attention, Transformers. Representation is learned.</p>
      </div>
    </div>
    <div class="visual-frame" style="margin-top:.9em;">
      <svg class="diagram" viewBox="0 0 1000 170" role="img" aria-label="Timeline from symbolic NLP to Transformer">
        <path d="M70 85 H930" stroke="#d9e1ea" stroke-width="2"/>
        <g fill="#ffffff" stroke-width="2">
          <circle cx="120" cy="85" r="18" stroke="#e3a12f"/>
          <circle cx="410" cy="85" r="18" stroke="#1597b5"/>
          <circle cx="650" cy="85" r="18" stroke="#8366c8"/>
          <circle cx="850" cy="85" r="18" stroke="#e3a12f" class="glow-amber"/>
        </g>
        <text x="120" y="50" text-anchor="middle" class="mono-label">1950s-80s</text>
        <text x="410" y="50" text-anchor="middle" class="mono-label">1990s-2010s</text>
        <text x="650" y="50" text-anchor="middle" class="mono-label">2014-16</text>
        <text x="850" y="50" text-anchor="middle" class="mono-label">2017</text>
        <text x="120" y="130" text-anchor="middle" class="label">rules</text>
        <text x="410" y="130" text-anchor="middle" class="label">counts</text>
        <text x="650" y="130" text-anchor="middle" class="label">attention</text>
        <text x="850" y="130" text-anchor="middle" class="label">Transformer</text>
      </svg>
    </div>
    <p class="sources"><strong>Sources:</strong> Hochreiter &amp; Schmidhuber (1997); Mikolov et al. (2013); Bahdanau et al. (2015).</p>
    <aside class="notes">
      This is the orienting timeline. The key transition for non-CS researchers: from telling the
      machine rules to letting it infer representations from data.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2>2017 - the hinge</h2>
    <h3>"Attention Is All You Need"</h3>
    <div class="cols">
      <div class="col" style="font-size:.8em;">
        <p>Self-<strong>attention</strong> lets every token weigh every other token in parallel.</p>
        <p>Parallelism made scale practical; scale made capability visible.</p>
        <div class="caption-row hinge-captions" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Attention</strong><span>Tokens compare against the whole sequence, not only neighbours.</span></div>
          <div class="mini-card"><strong>Feed-forward</strong><span>The model transforms that mixed context into new representations.</span></div>
          <div class="mini-card"><strong>Repeat</strong><span>Stack many layers, then predict the next token.</span></div>
        </div>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m01-transformer-hinge.png" alt="Light infographic of a Transformer layer with token pills, self-attention, feed-forward blocks and outputs">
      </div>
    </div>
    <p class="sources"><strong>Source:</strong> Vaswani et al. (2017), <em>Attention Is All You Need</em>, NeurIPS.</p>
    <aside class="notes">
      Do not deep-dive the full encoder-decoder architecture here. Land the pivot: attention plus
      parallelism made large-scale training feasible.
    </aside>
  </section>

  <section>
    <h2>2018 to today - the scaling era</h2>
    <div class="visual-frame">
      <svg class="diagram" viewBox="0 0 980 300" role="img" aria-label="Scaling era ladder">
        <g stroke-width="2" fill="none">
          <path d="M105 238 H875" stroke="#d9e1ea"/>
          <path d="M120 230 C235 190, 300 170, 420 146 S670 112, 840 70" stroke="#e3a12f" class="glow-amber"/>
        </g>
        <g>
          <circle cx="160" cy="218" r="12" fill="#e3a12f"/>
          <circle cx="360" cy="158" r="12" fill="#1597b5"/>
          <circle cx="560" cy="122" r="12" fill="#8366c8"/>
          <circle cx="785" cy="82" r="12" fill="#34956f"/>
        </g>
        <text x="160" y="260" text-anchor="middle" class="label">BERT / GPT</text>
        <text x="360" y="198" text-anchor="middle" class="label">GPT-3</text>
        <text x="560" y="162" text-anchor="middle" class="label">RLHF</text>
        <text x="785" y="122" text-anchor="middle" class="label">agents</text>
        <text x="160" y="282" text-anchor="middle" class="mono-label">pretraining transfers</text>
        <text x="360" y="220" text-anchor="middle" class="mono-label">scale laws</text>
        <text x="560" y="184" text-anchor="middle" class="mono-label">assistant behaviour</text>
        <text x="785" y="144" text-anchor="middle" class="mono-label">tools + loops</text>
      </svg>
    </div>
    <div class="takeaway">The prediction substrate never changed. What emerged is a new <em>level</em> at which to read the system.</div>
    <p class="sources"><strong>Sources:</strong> Devlin et al. (2018); Brown et al. (2020); Ouyang et al. (2022).</p>
    <aside class="notes">
      Tee up the levels slide: the base is still prediction, but "just prediction" is the wrong level
      to reason at. Then Module 2 opens the base layer itself.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2>Three levels, one machine</h2>
    <p class="lede">Prediction is the <em>substrate</em>, not the ceiling. The mistake is reading a system at the wrong level.</p>
    <p class="footnote" style="font-style:italic;">&ldquo;A livello microscopico abbiamo i neuroni, a livello mesoscopico di mezzo abbiamo queste idee.&rdquo; &mdash; Nello Cristianini <span style="font-style:normal;">(micro = neurons; meso = the learned ideas in between)</span></p>
    <div class="cols fit-two">

      <div class="col visual-frame media-fit levels-frame">
        <img src="assets/img/m01-levels-machine-v2.png" alt="Three-layer machine cutaway: probabilistic token substrate, learned concept layer, and human judgement layer">
      </div>

      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-amber);">
          <h4><span class="chip safe">macro &middot; exo</span> Behaviour &amp; judgement</h4>
          <p>The system read at a behavioural, almost psychological level (Dennett's stance) &mdash; and the human judgement that governs it.</p>
          <p class="mono-label">Relate by: understanding, contesting, overriding.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);">
          <h4><span class="chip around">meso &middot; meso</span> Learned concepts &amp; competence</h4>
          <p>The abstract ideas the model built by itself (Cristianini's mesoscopic level) &mdash; the seat of reasoning, memory, skills and tools.</p>
          <p class="mono-label">Relate by: steering with prose, context and tools &mdash; this is where you work.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-cyan);">
          <h4><span class="chip inside">micro &middot; tropo</span> Substrate</h4>
          <p>Neurons and weights computing Shannon's next-token probabilities. Always on, intrinsically statistical.</p>
          <p class="mono-label">Relate by: knowing its failure modes &mdash; sampling, temperature, hallucination.</p>
        </div>
      </div>
    </div>
    <div class="takeaway">Keep Shannon at the base. Do your thinking &mdash; and your steering &mdash; at the meso level.</div>
    <p class="sources"><strong>Sources:</strong>
      Cristianini (2024/2025), <em>Machina Sapiens</em> &amp; interview (micro / meso / macro levels of machine cognition);
      Marr (1982) levels of analysis; Anderson (1972) <em>More Is Different</em>; Schaeffer et al. (2023) on the metric-sensitivity of &ldquo;emergence&rdquo;.
    </p>
    <aside class="notes">
      Cite Cristianini's mesoscopic level in one breath, then hand over to the atmosphere metaphor.
      His three levels: microscopic (neurons/connections), mesoscopic (the abstract concepts the model
      learned by itself, e.g. the "Golden Gate" feature), macroscopic (behaviour read almost like a
      psychology of machines, where he meets Dennett). Guard the flank: this is a claim about the right
      LEVEL of description (Marr), not that the model became a mind. Schaeffer shows "emergent abilities"
      can be a metric artefact - fine, because the argument is about level, not a magic switch. Every
      module from here answers: which level are we on? Module 2 = substrate; Modules 3-6 = meso system;
      Modules 7-8 = macro behaviour and judgement.
    </aside>
  </section>

</section>

<section>

  <section class="module-cover" data-background-image="assets/img/module-02-llm-core.png" data-background-size="cover" data-background-color="#fbfaf6">

    <p class="kicker">Module 2</p>
    <h1>Inside an LLM</h1>
    <p class="lede">Next-token prediction, tokens, and the probabilistic nature of every output.</p>
    <aside class="notes">
      Goal: demystify. By the end they should see an LLM as a sampler from a conditional distribution:
      powerful, but not magic, and not a database of facts.
    </aside>
  </section>

  <section>
    <h2>Tokens, not words or letters</h2>
    <p style="font-size:.8em;">The model sees sub-word pieces. That is why some "obvious" letter tasks are mechanically awkward.</p>
    <div class="visual-frame">
      <div class="tokenizer-widget" data-tokenizer-widget>

    <p class="footnote">Widget note: this is a teaching tokenizer; exact splits depend on the model vocabulary.</p>
    <p class="sources"><strong>Source:</strong> Sennrich et al. (2016), Byte-Pair Encoding for NMT.</p>
    <aside class="notes">
      Great myth-buster for a STEM crowd: the unit of perception is the token. Embeddings turn those
      token IDs into vectors.
    </aside>
  </section>

  <section>
    <h2>From tokens to vectors</h2>
    <div class="cols top token-vector-grid">
      <div class="col stack-sm" style="font-size:.76em;">
        <p>Each token maps to a high-dimensional <strong>embedding</strong>.</p>
        <p>Geometry carries relationships: similar meanings sit nearby.</p>
        <p class="footnote">We meet embeddings again in Module 3 and Module 4.</p>
        <div class="visual-frame vector-diagram-frame">
        <svg class="diagram" viewBox="0 0 520 340" role="img" aria-label="Embedding space diagram">

  <section>
    <h2>One operation, repeated</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.82em;">
        <p>An LLM computes a probability distribution over the next token:</p>
        <p>$P(t_n \mid t_1, t_2, \dots, t_{n-1})$</p>
        <p>It <strong>samples</strong> one token, appends it, and repeats.</p>
        <div class="takeaway">Fluency is a loop, not a lookup.</div>
      </div>
      <div class="col visual-frame">
        <div class="prob-widget" data-next-token-widget>
          <div class="prompt-switcher" role="group" aria-label="Choose a starting phrase">
            <button type="button" data-prompt="The satellite detected" aria-pressed="true">satellite</button>
            <button type="button" data-prompt="The grant proposal needs" aria-pressed="false">grant</button>
            <button type="button" data-prompt="To verify the result" aria-pressed="false">verify</button>
            <button type="button" data-prompt="The old archive contains" aria-pressed="false">archive</button>
          </div>

        </div>
      </div>
    </div>
    <aside class="notes">
      Hammer the loop. Hallucination, creativity and fluency all fall out of sampling from a
      distribution. Forward-reference temperature.
    </aside>
  </section>


  <section data-background-color="#f4f8fb">
    <h2>Temperature: the determinism dial</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.8em;">
        <p>Temperature reshapes the distribution before sampling:</p>
        <ul>
          <li><strong>Low T</strong>: sharp, stable, repetitive</li>
          <li><strong>High T</strong>: flatter, creative, riskier</li>
        </ul>
        <p>$p_i = \frac{e^{z_i/T}}{\sum_j e^{z_j/T}}$</p>
      </div>
      <div class="col visual-frame">
        <div class="temp-widget" data-temp-widget>
          <p class="micro">T = <span data-temp-value>0.7</span></p>
          <input class="temp-slider" type="range" min="0.2" max="2.0" step="0.1" value="0.7" aria-label="Temperature">
          <div class="bar-list"></div>
          <svg class="temp-distribution" viewBox="0 0 520 185" data-temp-distribution role="img" aria-label="Live probability distribution curve"></svg>
          <p class="temp-warning">Effect exaggerated for understanding the concept.</p>
        </div>
      </div>
    </div>
    <aside class="notes">
      This is the high-value interactive moment: low versus high temperature on the same distribution.
      Keep the message simple: randomness is a setting, not a personality.
    </aside>
  </section>

  <section>
    <h2>"Stochastic parrot" - useful provocation</h2>
    <div class="cols">
      <div class="col visual-frame tight" style="max-width:520px;">
        <img src="assets/img/stochastic-parrot.png" alt="Schematic parrot made of token pills on an amber waveform">
      </div>
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-red);">
          <h4>The critique</h4>
          <p>Fluent form can invite us to over-attribute meaning.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-green);">
          <h4>The counter-view</h4>
          <p>Prediction at scale may learn structure that functions like understanding.</p>
        </div>
        <div class="takeaway">Use the phrase as a warning label: fluency is evidence of pattern mastery, not proof of grounded truth.</div>
      </div>
    </div>
    <p class="footnote">Present as a live scientific debate, not a settled verdict. Source: Bender, Gebru, McMillan-Major &amp; Shmitchell (2021).</p>
    <aside class="notes">
      Hold the tension deliberately. The point is not to resolve the debate but to make the audience
      careful about anthropomorphising.
    </aside>
  </section>

  <section>
    <h2>See the loop run</h2>
    <p style="font-size:.8em;">The model does not retrieve a finished answer. It builds text one token at a time.</p>
    <div class="visual-frame short loop-run-frame">
      <svg class="diagram" viewBox="0 0 980 250" role="img" aria-label="Token generation loop">
        <defs>
          <marker id="arrow02" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
            <path d="M0,0 L10,5 L0,10" fill="none" stroke="#e3a12f" stroke-width="1.8"/>
          </marker>
        </defs>
        <g fill="rgba(255,255,255,.84)" stroke-width="2">
          <rect x="52" y="78" width="228" height="94" rx="16" stroke="#1597b5"/>
          <rect x="376" y="78" width="228" height="94" rx="16" stroke="#e3a12f"/>
          <rect x="700" y="78" width="228" height="94" rx="16" stroke="#8366c8"/>
        </g>
        <text x="166" y="112" text-anchor="middle" class="label">1. Current context</text>
        <text x="166" y="142" text-anchor="middle" class="mono-label">prompt + generated tokens</text>
        <text x="490" y="112" text-anchor="middle" class="label">2. Token odds</text>
        <text x="490" y="142" text-anchor="middle" class="mono-label">many possible continuations</text>
        <text x="814" y="112" text-anchor="middle" class="label">3. Sample, append</text>
        <text x="814" y="142" text-anchor="middle" class="mono-label">choice becomes new context</text>
        <path d="M290 125 H366M614 125 H690" stroke="#e3a12f" stroke-width="2.4" marker-end="url(#arrow02)" class="glow-amber"/>
        <path d="M814 184 C720 230, 262 230, 166 184" fill="none" stroke="#8366c8" stroke-width="2.2" stroke-dasharray="7 8" marker-end="url(#arrow02)"/>

    <div class="takeaway">Every word changes the next prediction because it becomes part of the model's new context.</div>
    <aside class="notes">
      Make the feedback loop explicit: generated text is not post-processing. The chosen token is fed
      back into the next step, so early choices steer later probabilities.
    </aside>
  </section>

</section>


<!-- ===== 03-architectures.html ===== -->
<section>

  <section class="module-cover" data-background-image="assets/img/module-03-architectures.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">03</span>
    <p class="kicker">Module 3</p>
    <h1>Architectures</h1>
    <p class="lede">Two layers people conflate: what is <em>inside</em> the model vs. what is built <em>around</em> it.</p>
    <aside class="notes">
      The single most important conceptual correction: MoE and embeddings are inside the model;
      agents are around it. Most confusion lives on this boundary.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2>The boundary</h2>
    <div class="cols">
      <div class="col visual-frame media-fit">
        <img src="assets/img/m03-boundary-motherboard.png" alt="LLM processor mounted in a motherboard of memory, tools and orchestration components">
      </div>
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-cyan);">
          <h4>Inside: processor</h4>
          <p>Weights, attention, embeddings, MoE routers and trained behaviours live inside the model.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);">
          <h4>Around: scaffold</h4>
          <p>Memory, tools, retrieval, policies and loops route work around a usually frozen model.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);">
          <h4>The test</h4>
          <p>If it changes parameters, it is inside. If it supplies context or actions, it is around.</p>
        </div>
      </div>
    </div>
    <div class="takeaway">Think of the LLM as the processor. The agent system is the motherboard that connects memory, tools and guardrails.</div>
    <aside class="notes">
      Give the concrete test: does it change the weights? MoE = yes, inside. Agent calling a
      calculator = no, around. This frame governs the rest of the module.
    </aside>
  </section>

  <section>
    <h2><span class="chip inside">3a</span> How a model is made</h2>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m03-training-pipeline.png" alt="Three-stage light infographic for pretraining, supervised fine-tuning and preference tuning">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>1. Pretraining</strong><span>Predict tokens over huge corpora. This builds general linguistic and world patterns.</span></div>
        <div class="mini-card"><strong>2. Instruction tuning</strong><span>Examples teach the model to follow tasks as an assistant, not merely continue text.</span></div>
        <div class="mini-card"><strong>3. Preference tuning</strong><span>Human or automated feedback pushes outputs toward helpful, harmless, verifiable behaviour.</span></div>
      </div>
    </div>
    <p class="footnote">Embeddings live here too: specialised embedding models are later used for retrieval.</p>
    <p class="sources"><strong>Sources:</strong> Brown et al. (2020); Ouyang et al. (2022); Christiano et al. (2017).</p>
    <aside class="notes">
      Non-CS researchers often think "the model" is one trained thing. Show the pipeline. Assistant
      behaviour comes mostly from post-training.
    </aside>
  </section>

  <section>
    <h2><span class="chip inside">3a</span> Attention &amp; Mixture-of-Experts</h2>
    <div class="cols top fit-two">
      <div class="col">
        <div class="visual-frame media-fit">
          <img src="assets/img/m03-attention.png" alt="Token pills connected by clean self-attention arcs">
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-cyan);margin-top:.45em;">
          <h4>Attention</h4>
          <p>Each token builds a weighted summary of other tokens in the same context.</p>
        </div>
      </div>
      <div class="col">
        <div class="visual-frame media-fit">
          <img src="assets/img/m03-moe.png" alt="Mixture-of-Experts router lighting up two expert blocks from a grid">
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);margin-top:.45em;">
          <h4>Mixture-of-Experts</h4>
          <p>A router activates a small subset of expert blocks, increasing capacity without using all parameters every token.</p>
        </div>
      </div>
    </div>
    <p class="sources"><strong>Sources:</strong> Vaswani et al. (2017); Shazeer et al. (2017).</p>
    <aside class="notes">
      Emphasise MoE is an internal efficiency trick, not an agent or a committee of models talking to
      one another.
    </aside>
  </section>

  <section>
    <h2><span class="chip inside">3a</span> "Reasoning" - two senses</h2>
    <div class="cols">
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-cyan);">
          <h4>Trained reasoning</h4>
          <p>Post-training changes the system so deliberation is part of the model behaviour.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);">
          <h4>Prompted reasoning</h4>
          <p>A frozen model is wrapped with instructions, examples or loops that ask it to show steps.</p>
        </div>
      </div>
      <div class="col visual-frame">
        <div class="reason-widget" data-reason-widget>
          <div class="mode-buttons">
            <button type="button" data-mode="trained" aria-pressed="true">Trained</button>
            <button type="button" data-mode="prompted" aria-pressed="false">Prompted</button>
          </div>
          <div class="reason-diagram" data-reason-diagram></div>
          <p class="reason-copy" data-reason-copy></p>
        </div>
      </div>
    </div>
    <div class="takeaway">Same surface behaviour, different mechanism.</div>
    <p class="sources"><strong>Sources:</strong> Wei et al. (2022); Nye et al. (2021).</p>
    <aside class="notes">
      Keep inside/around discipline: trained reasoning is inside, prompted reasoning is a technique
      applied from outside.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2><span class="chip around">3b</span> Agents = LLM + loop + tools + memory</h2>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m03-agent-loop.png" alt="Central LLM processor wrapped by a clean agent loop of actions, tools, memory and observation">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>Loop</strong><span>Decide what to do next, observe the result, then decide again.</span></div>
        <div class="mini-card"><strong>Tools</strong><span>Actions outside the model: search, files, code, databases, APIs.</span></div>
        <div class="mini-card"><strong>Memory</strong><span>State supplied around the model so the next call has useful context.</span></div>
      </div>
    </div>
    <p class="footnote">Patterns: ReAct, planning, reflection, multi-agent orchestration. Tools and memory get their own modules.</p>
    <p class="sources"><strong>Sources:</strong> Yao et al. (2023) ReAct; Schick et al. (2023) Toolformer.</p>
    <aside class="notes">
      Land the payoff: the leap from chatbot to agent is mostly scaffolding, not a smarter model.
    </aside>
  </section>

</section>


<!-- ===== 04-context-memory.html ===== -->
<section>

  <section class="module-cover" data-background-image="assets/img/module-04-context-memory.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">04</span>
    <p class="kicker">Module 4</p>
    <h1>Context &amp; memory</h1>
    <p class="lede">The window, its limits, and how systems remember beyond it.</p>
    <aside class="notes">
      Core distinction: context is what is in the prompt right now; memory is what persists across
      turns or sessions. They are engineered differently.
    </aside>
  </section>

  <section>
    <h2>The context window</h2>
    <p style="font-size:.8em;">Context is the model's immediate working memory: what is loaded for this call.</p>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m04-context-ram.png" alt="RAM-like context window with colored token segments loaded into immediate memory slots">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>System</strong><span>Rules and role instructions sit at the front of the working set.</span></div>
        <div class="mini-card"><strong>History + RAG</strong><span>Conversation and retrieved chunks compete for the same finite space.</span></div>
        <div class="mini-card"><strong>Answer room</strong><span>The model also needs budget to produce the next tokens.</span></div>
      </div>
    </div>
    <div class="takeaway">Bigger windows help, but they are not free.</div>
    <aside class="notes">
      Make tokens tangible: roughly three quarters of a word each. The window is working memory, wiped
      every call unless you re-supply it.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2>Long context: placement still matters</h2>
    <div class="cols top context-placement-layout">
      <div class="col stack-sm" style="font-size:.74em;">
        <p><em>Lost in the Middle</em> is about position-sensitive retrieval: evidence near the beginning or end of a long prompt is often used better than evidence buried in the middle.</p>
        <p>A larger window gives more room, but it does not make all positions equally salient. Retrieval and ordering still matter.</p>
        <div class="context-scale-grid">
          <div class="scale-card"><strong>GPT-3</strong><span>2k tokens<br>about 1,500 words</span></div>
          <div class="scale-card"><strong>GPT-4</strong><span>8k / 32k<br>about 6k / 24k words</span></div>
          <div class="scale-card"><strong>GPT-4 Turbo</strong><span>128k tokens<br>about 96k words</span></div>
          <div class="scale-card"><strong>GPT-5.5</strong><span>1M tokens<br>about 1.5 LOTR trilogies</span></div>
        </div>
        <p class="footnote">Rule of thumb: 1 token is about 0.75 English words; the LOTR trilogy is roughly 480k words.</p>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/middle_sag.png" alt="Lost in the middle curve showing lower retrieval accuracy for information placed in the middle of context">
      </div>
    </div>
    <p class="sources"><strong>Sources:</strong> Liu et al. (2023/24), <em>Lost in the Middle</em>, TACL; Brown et al. (2020); OpenAI DevDay (2023); OpenAI model docs (accessed 2026-07-01).</p>
    <aside class="notes">
      Counter the "just use a huge window" reflex. Relevance curation beats dumping everything in.
    </aside>
  </section>

  <section>
    <h2>Memory beyond the window</h2>
    <div class="cols">
      <div class="col visual-frame media-fit">
        <video src="assets/video/context.mp4" autoplay loop muted playsinline data-autoplay style="width:100%;height:auto;display:block;border-radius:16px;"></video>
      </div>
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-violet);"><h4>Short-term</h4><p>Conversation history replayed each turn.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Long-term</h4><p>Facts stored externally and retrieved when relevant.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Synthesis</h4><p>Old turns compressed into compact notes.</p></div>
      </div>
    </div>
    <div class="takeaway">Memory is architecture around the model, not a magical internal recall.</div>
    <aside class="notes">
      Summarisation is lossy. Flag the trade-off: forgetting versus overflow. Bridges to Module 5.
    </aside>
  </section>

  <section>
    <h2>RAG - retrieve, then generate</h2>
    <div class="visual-frame generated-flow-frame rag-frame" role="img" aria-label="RAG pipeline: Query, Embed, Vector search, Top-k chunks, LLM, Answer">
      <img src="assets/img/m04-rag-flow-v2.png" alt="">
      <span class="flow-label rag-query">Query</span>
      <span class="flow-label rag-embed">Embed</span>
      <span class="flow-label rag-search">Vector search</span>
      <span class="flow-label rag-chunks">Top-k chunks</span>
      <span class="flow-label rag-llm">LLM</span>
      <span class="flow-label rag-answer">Answer</span>
    </div>
    <p class="footnote">Same embeddings from Module 2 - now used as a search index.</p>
    <p class="sources"><strong>Sources:</strong> Lewis et al. (2020); Karpukhin et al. (2020).</p>
    <aside class="notes">
      RAG is the single most useful pattern this audience will actually build: retrieve the few
      relevant chunks, not the whole library.
    </aside>
  </section>

</section>


<!-- ===== 05-behaviour-control.html ===== -->
<section>

  <section class="module-cover" data-background-image="assets/img/module-05-behaviour-control.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">05</span>
    <p class="kicker">Module 5</p>
    <h1>Behaviour control</h1>
    <p class="lede">Steering an agent with natural language: instructions, skills, and tools.</p>
    <aside class="notes">
      Reframe programming for this audience: you shape behaviour mostly by writing prose, not code.
      Markdown is the substrate. Filenames vary by vendor; the principle is general.
    </aside>
  </section>

  <section>
    <h2>Prose steers behaviour</h2>
    <div class="cols">
      <div class="col" style="font-size:.82em;">
        <p>Agents are steered at two scopes: <strong>persistent instruction files</strong> and the <strong>current task prompt</strong>.</p>
        <p>CO-STAR structures that task prompt: Context, Objective, Style, Tone, Audience, Response.</p>
        <div class="caption-row control-captions" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Persistent rules</strong><span>Reusable constraints: safety, source policy, project vocabulary and conventions.</span></div>
          <div class="mini-card"><strong>Task prompt · CO-STAR</strong><span>The goal and background, plus the desired style, tone, audience and response format.</span></div>
          <div class="mini-card"><strong>Connected, not identical</strong><span>CO-STAR shapes one request; instruction files carry stable guidance across many requests.</span></div>
        </div>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m05-prose-stack.png" alt="Layered instruction sheets guiding an agent behaviour signal">
      </div>
    </div>
    <p class="sources"><strong>Source:</strong> <a href="https://www.tech.gov.sg/technews/mastering-the-art-of-prompt-engineering-with-empower/">GovTech Singapore, CO-STAR framework</a> (2025).</p>
    <aside class="notes">
      CO-STAR is genuinely related, but it is a prompt scaffold rather than a complete model of
      persistent agent configuration. Stress principle over brand: both make prose explicit,
      reviewable and reusable at different scopes.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2>Why Markdown?</h2>
    <div class="cols">
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Readable</h4><p>Humans and models can parse it.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-cyan);"><h4>Diffable</h4><p>Behaviour changes show up in git.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Structured</h4><p>Headings and lists give salient cues.</p></div>
      </div>
      <div class="col visual-frame">
        <div class="layered-file">
          <div class="rule"># Persistent rules</div>
          <div>- cite primary sources</div>
          <div>- never hide uncertainty</div>
          <br>
          <div class="context">## Task prompt · CO-STAR</div>
          <div>- Context: AI theory lesson</div>
          <div>- Objective: explain RAG</div>
          <div>- Style: concrete examples</div>
          <div>- Tone: concise, sceptical</div>
          <div>- Audience: STEM researchers</div>
          <div>- Response: 3 bullets + diagram</div>
          <br>
          <div class="comment"># behaviour is now reviewable</div>
        </div>
      </div>
    </div>
    <aside class="notes">
      For researchers: this is specification as documentation. The artefact that controls the agent is
      the same artefact a colleague reads to understand it.
    </aside>
  </section>

  <section>
    <h2>Skills - packaged competence</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.78em;">
        <p>A <strong>skill</strong> is a reusable capability package. It tells the agent when to load extra instructions, scripts and resources.</p>
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Structure</h4><p><code>name</code>, <code>description</code>, trigger rules, instructions, optional scripts/resources.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Triggered by intent</h4><p>The description is the match surface: "debug this" loads diagnosis; "grill me" loads a critique flow.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);"><h4>Examples</h4><p><code>grill-with-docs</code>, <code>caveman</code>, <code>personas</code>, <code>skill-creator</code>.</p></div>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m05-skill-structure.png" alt="Skill package with manifest, trigger, instructions, scripts and resources">
      </div>
    </div>
    <aside class="notes">
      Skills = modularity for behaviour. Good place to mention this very project uses skills.
    </aside>
  </section>

  <section>
    <h2>Tools - actions the model can take</h2>
    <div class="cols">
      <div class="col stack-sm">
        <p style="font-size:.72em;">A tool is procedural: the agent fills a typed input, external code runs, then the result returns to context.</p>
        <pre><code class="language-json" data-trim>{
  "name": "read_pdf",
  "description": "Extract text and tables",
  "input_schema": {
    "file": "path",
    "pages": "range"
  }
}</code></pre>
        <div class="caption-row" style="grid-template-columns:1fr 1fr;">
          <div class="mini-card"><strong>Formats</strong><span>PDF, XLSX, DOCX, PPTX, CSV, images, audio.</span></div>
          <div class="mini-card"><strong>Result</strong><span>Parsed content returns as structured context the model can reason over.</span></div>
        </div>
      </div>
      <div class="col visual-frame media-fit">
        <img src="assets/img/m05-tools-file-formats.png" alt="Procedural tool calls opening file formats such as PDF, spreadsheet and document outputs">
      </div>
    </div>
    <p class="footnote">Skills shape how the agent behaves. Tools give it procedures and file-format access.</p>
    <aside class="notes">
      The schema is the contract. Forward-reference MCP as the standard way to expose tools across
      systems.
    </aside>
  </section>

</section>


<!-- ===== 06-mcp-connectors.html ===== -->
<section>

  <section class="module-cover" data-background-image="assets/img/module-06-mcp-connectors.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">06</span>
    <p class="kicker">Module 6</p>
    <h1>MCP &amp; connectors</h1>
    <p class="lede">How an agent reaches the outside world: a standard plug, not bespoke wiring.</p>
    <aside class="notes">
      This answers "how does it touch my files, calendar or database?" Frame MCP as the USB-C of
      agent tooling: one protocol instead of N custom integrations.
    </aside>
  </section>

  <section>
    <h2>Why a shared protocol?</h2>
    <p style="font-size:.8em;">If <strong>M assistants</strong> must connect to <strong>N tools</strong>, bespoke wiring can mean up to <strong>M × N pair-specific integrations</strong>. A shared protocol gives both sides one common interface.</p>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m06-mxn-convention.png" alt="Agents and servers exchanging common message envelopes through one shared protocol lane">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>M assistants × N tools</strong><span>Each pair may otherwise need bespoke glue code — the source of “M × N”.</span></div>
        <div class="mini-card"><strong>With MCP</strong><span>Agents and servers speak the same request/response grammar.</span></div>
        <div class="mini-card"><strong>Not shared data</strong><span>MCP moves requests, results and capability descriptions; it does not merge data stores.</span></div>
      </div>
    </div>
    <aside class="notes">
      Define the notation aloud: M client applications times N tool servers. The title is now plain
      language; the M × N term remains in the body as the reason standards reduce integration work.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">

    <p class="kicker">Module 7 · interlude</p>
    <h1>Agents in practice</h1>
    <p class="lede">How leading practitioners actually work with the meso-level system: spec, verify, environment.</p>
    <aside class="notes">
      Bridge module: Modules 3–6 described the system; before we discuss risks, show how people who
      use it seriously say you should drive it. Spine: Andrej Karpathy (OpenAI co-founder, ex-Tesla
      AI director); woven in: Mollick (field evidence), Pocock (working method), Shankar (evals),
      Huyen (the engineering discipline). This is the macro level entering the picture: human
      judgement engaging the meso system deliberately.
    </aside>
  </section>

  <section>
    <h2>Ghosts, not animals</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.8em;">
        <p>Karpathy's mental model: we are not building <strong>animals</strong> (evolved drives, embodied common sense) — we are summoning <strong>ghosts</strong>: statistical simulations of human text.</p>
        <div class="signal-card" style="--card-accent:var(--ait-violet);"><h4>Jagged intelligence</h4><p>Capability spikes where training was verifiable and emphasised; it stagnates elsewhere. There is no manual.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>The car-wash test</h4><p>A model that refactors a 100,000-line codebase may advise <em>walking</em> to the car wash 50&nbsp;m away — missing that the car must come along.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Measured, not just felt</h4><p>Field experiment, 758 BCG consultants: AI raised quality <em>inside</em> the frontier and degraded it <em>outside</em> — on tasks of similar apparent difficulty.</p></div>
      </div>
      <div class="col vertical-captions">
        <div class="mini-card"><strong>Animals (colleagues)</strong><span>Intrinsic motivation; adapt under pressure; know what they don't know.</span></div>
        <div class="mini-card"><strong>Ghosts (agents)</strong><span>Pattern completion; indifferent to urgency; confidently blind to missing context.</span></div>
        <div class="mini-card"><strong>Consequence</strong><span>Manage by rigorous specification and verification, not by goal-and-trust delegation.</span></div>
      </div>
    </div>
    <div class="quote-strip">
      <blockquote>"We're not building animals. We're building ghosts or spirits."<cite>Karpathy, Dwarkesh Podcast (2025)</cite></blockquote>
      <blockquote>"They are jagged, alien tools... be suspicious of the system and figure it out empirically."<cite>Karpathy, AI Ascent (2026)</cite></blockquote>
    </div>
    <p class="sources"><strong>Sources:</strong> <a href="https://www.dwarkesh.com/p/andrej-karpathy">Dwarkesh Podcast interview (Oct 2025)</a>; <a href="https://karpathy.bearblog.dev/animals-vs-ghosts/">Karpathy, "Animals vs Ghosts" (2025)</a>; <a href="https://karpathy.bearblog.dev/sequoia-ascent-2026/">Karpathy, Sequoia AI Ascent summary (2026)</a>; <a href="https://pubsonline.informs.org/doi/10.1287/orsc.2025.21838">Dell'Acqua, McFowland, Mollick, Lifshitz-Assaf, Kellogg et al., "Navigating the Jagged Technological Frontier" (Organization Science)</a>.</p>
    <aside class="notes">
      This is the practitioner's version of our anti-anthropomorphism thread (Module 2) and the
      tropo-layer: underneath the fluent behaviour there is still a stochastic estimator. The
      car-wash example is Karpathy's own, from the Ascent fireside chat. The frontier study
      (Mollick and colleagues, with BCG) is the peer-reviewed counterpart of Karpathy's
      "jagged" intuition — same shape, measured: consultants using AI outside the frontier were
      19 points <em>less</em> likely to be correct than controls. Karpathy's metaphor, Mollick's data.
    </aside>
  </section>

  <section class="practice-slide" data-background-color="#f4f8fb">
    <h2>1 — Own the spec</h2>
    <div class="cols">
      <div class="col" style="font-size:.8em;">
        <p>The agent fills in blanks; <strong>the human owns the plan</strong>. Karpathy: work with the agent to design a detailed spec — don't delegate the goal itself.</p>
        <div class="caption-row" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Goal, not task</strong><span>State the decision the work serves, not just the action ("report" vs "what the report must let us decide").</span></div>
          <div class="mini-card"><strong>Let it grill you</strong><span>Pocock inverts the interview: the agent interrogates <em>you</em> until the spec survives questioning — assumptions surface instead of being guessed silently.</span></div>
          <div class="mini-card"><strong>Iterate, don't waterfall</strong><span>Small scoped slices with checkpoints; one giant prompt maximises drift — and keeps the context out of the model's degraded "dumb zone".</span></div>
        </div>
      </div>
      <div class="col" style="font-size:.8em;">
        <div class="signal-card" style="--card-accent:var(--ait-amber);"><h4>Cautionary tale: the Stripe bug</h4><p>Karpathy's agent matched payments to accounts by <em>email address</em> instead of a persistent user ID. Plausible code, wrong system design — only human judgement catches it.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Who does what</h4><p>"You are in charge of oversight and the top-level categories. The agents do much of the work underneath."</p></div>
      </div>
    </div>
    <p class="footnote">This deck's own repository is built with grill/spec skills — the method teaches itself.</p>
    <p class="sources"><strong>Sources:</strong> <a href="https://karpathy.bearblog.dev/sequoia-ascent-2026/">Karpathy, Sequoia AI Ascent summary (2026)</a>; <a href="https://www.youtube.com/watch?v=96jN2OCOfLs">fireside chat video</a>; <a href="https://www.aihero.dev/posts">Pocock, AI Hero</a>; <a href="https://www.youtube.com/watch?v=-QFHIoCo-Ko">Pocock, "Workflow for AI Coding", AI Engineer (2026)</a>.</p>
    <aside class="notes">
      Connect back to Module 5: the spec is prose-as-program applied to a single piece of work.
      The Stripe/Google email example is verbatim from Karpathy's talk — great for researchers:
      the model's output was locally plausible and globally wrong. Pocock's "grill" flow is the
      same layer as Karpathy's spec ownership, turned into a reusable skill; his "smart/dumb zone"
      observation (reasoning degrades as the window fills) echoes Module 4's Lost-in-the-Middle.
      Cite Pocock as practice, not evidence — practitioner method, not a peer-reviewed claim.
    </aside>
  </section>

  <section class="practice-slide">
    <h2>2 — Build a verification loop</h2>
    <div class="cols">
      <div class="col" style="font-size:.8em;">
        <p>Karpathy's automation thesis: traditional software automates what you can <strong>specify</strong>; LLMs automate what you can <strong>verify</strong>. So make your own work verifiable.</p>
        <div class="caption-row" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Criteria first…</strong><span>Define measurable success before generation — structure, counts, checks — not "make it readable".</span></div>
          <div class="mini-card"><strong>…but expect criteria drift</strong><span>Shankar et al.: grading real outputs <em>changes</em> your criteria — evaluation is a loop that sharpens the spec, not a one-off gate.</span></div>
          <div class="mini-card"><strong>Independent critic</strong><span>Audit output with a second model or fresh context; cross-examination exposes blind spots.</span></div>
          <div class="mini-card"><strong>External ground truth</strong><span>Tests, logs, reference documents — never the model's self-assessment alone.</span></div>
        </div>
      </div>
      <div class="col stack-sm">
        <div class="quote-strip" style="grid-template-columns:1fr;">
          <blockquote>"Give Claude a way to verify its work. If Claude has that feedback loop, it will 2-3x the quality of the final result."<cite>Boris Cherny, creator of Claude Code (2026)</cite></blockquote>
        </div>
        <div class="takeaway" style="font-size:.8em;">Verification is where the quality comes from — the generator is cheap, the check is the craft.</div>
      </div>
    </div>
    <p class="sources"><strong>Sources:</strong> <a href="https://karpathy.bearblog.dev/verifiability/">Karpathy, "Verifiability" (2025)</a>; <a href="https://karpathy.bearblog.dev/sequoia-ascent-2026/">Sequoia AI Ascent summary (2026)</a>; <a href="https://x.com/bcherny/status/2007179861115511237">Cherny on verification loops (X, 2026)</a>; <a href="https://doi.org/10.1145/3654777.3676450">Shankar et al., "Who Validates the Validators?" (UIST 2024)</a>.</p>
    <aside class="notes">
      The verifiability thesis also explains jaggedness (why code and maths race ahead). For
      non-code work: feed exemplar documents as ground truth for tone and structure. Cherny's 2-3x
      is a practitioner's estimate, not a controlled study — say so. Shankar's "criteria drift" is
      peer-reviewed and subtle: people think they know their criteria until they grade outputs;
      the act of verifying refines what "good" means. So the spec (slide 1) and the verifier
      (this slide) feed each other — it is one loop, not a pipeline. LLM-as-judge inherits the
      judge's flaws; that is why the human stays in the grading loop.
    </aside>
  </section>

  <section class="practice-slide" data-background-color="#f4f8fb">
    <h2>3 — Invest in the environment</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.8em;">
        <p>Every blank chat resets the ghost. Persistent scaffolding — the <em>around</em> stack of Modules 4–6 — is where reliability compounds. Huyen: this is now a discipline, <strong>AI engineering</strong> — building on foundation models you don't train, where evaluation carries the weight.</p>
        <div class="signal-card" style="--card-accent:var(--ait-green);"><h4>Instruction files</h4><p>Project context loaded every session (Module 5: CLAUDE.md, AGENTS.md — same idea).</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-cyan);"><h4>Skills that compound</h4><p>Repeated workflow → codified skill → refined on each edge case.</p></div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);"><h4>Legible knowledge</h4><p>Well-organised local documents let a general model act with domain accuracy.</p></div>
      </div>
      <div class="col" style="font-size:.8em;">
        <p><strong>Guardrails by risk, not by politeness.</strong> Prose rules are suggestions a model can override; high-risk actions need deterministic blocks.</p>
        <div class="caption-row" style="grid-template-columns:1fr;">
          <div class="mini-card"><strong>Always do</strong><span>Low-risk routine — runs on autopilot via instructions.</span></div>
          <div class="mini-card"><strong>Ask first</strong><span>Moderate risk — mandatory confirmation before acting.</span></div>
          <div class="mini-card"><strong>Never do</strong><span>Destructive actions — hard-blocked at the tool level, outside the model's reach.</span></div>
        </div>
      </div>
    </div>
    <p class="footnote">Karpathy's autonomy slider: you choose how long the leash is, task by task.</p>
    <p class="sources"><strong>Sources:</strong> <a href="https://www.youtube.com/watch?v=LCEmiRjPEtQ">Karpathy, "Software Is Changing (Again)", YC AI Startup School (2025)</a>; <a href="https://www.anthropic.com/engineering/claude-code-best-practices">Anthropic, Claude Code best practices (2025)</a>; <a href="https://www.oreilly.com/library/view/ai-engineering/9781098166298/">Huyen, <em>AI Engineering</em> (O'Reilly, 2025)</a>.</p>
    <aside class="notes">
      The three-tier guardrail table foreshadows Module 8: prose instructions are part of the
      context, and context can be manipulated — that is exactly the injection problem. Deterministic
      blocks live outside the model, so they hold even when the context is compromised.
    </aside>
  </section>

  <section class="practice-slide">
    <h2>Outsource thinking, not understanding</h2>
    <div class="quote-strip" style="grid-template-columns:1fr;">
      <blockquote style="font-size:1.05em;">"You can outsource your thinking, but you can't outsource your understanding."<cite>a tweet Karpathy "keeps returning to" — AI Ascent (2026)</cite></blockquote>
    </div>
    <div class="cols" style="font-size:.8em;">
      <div class="col">
        <p>Two postures for staying in the loop — Mollick's terms, from the same BCG field study:</p>
        <div class="caption-row" style="grid-template-columns:1fr 1fr;">
          <div class="mini-card"><strong>Centaur</strong><span>Divide at a clear seam: human keeps judgement tasks, agent takes generation tasks; verify at the boundary.</span></div>
          <div class="mini-card"><strong>Cyborg</strong><span>Interleave at every step: draft, question, redirect — the loop runs continuously.</span></div>
        </div>
      </div>
      <div class="col">
        <p>Either way, someone must know <em>what is worth building, which result is suspicious, which trade-off is acceptable</em>. Mollick's rule: <strong>be the human in the loop</strong>.</p>
        <p>That someone is the macro level of our three-level picture: judgement does not automate away; it becomes the bottleneck — and the value.</p>
      </div>
    </div>
    <div class="takeaway">The better the ghost, the more the human's job is understanding.</div>
    <p class="sources"><strong>Sources:</strong> <a href="https://karpathy.bearblog.dev/sequoia-ascent-2026/">Karpathy, Sequoia AI Ascent summary (2026)</a>; <a href="https://pubsonline.informs.org/doi/10.1287/orsc.2025.21838">Dell'Acqua et al. (Organization Science)</a>; Mollick, <em>Co-Intelligence</em> (Portfolio, 2024).</p>
    <aside class="notes">
      Attribution matters: Karpathy explicitly says this is a tweet he keeps citing, not his own
      coinage — model the citation hygiene we preach. Centaur/cyborg: observed working styles of
      the consultants in the jagged-frontier experiment; popularised in Mollick's Co-Intelligence,
      whose rules include "always invite AI to the table", "be the human in the loop", and "assume
      this is the worst AI you will ever use". Hand-off to Module 8: what happens when the human is
      *not* in the loop and the context is hostile.
    </aside>
  </section>

</section>

  <section>
    <h2>1948 - Il linguaggio come processo stocastico</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.82em;">
        <p>Claude <strong>Shannon</strong> modella il testo come una sorgente che emette simboli con probabilità.</p>
        <p>Predire il simbolo successivo = ridurre l'<em>entropia</em>.</p>
        <p>$H = -\sum_i p_i \log_2 p_i$</p>
        <div class="takeaway">Il significato diventa trattabile quando il linguaggio ha struttura.</div>
      </div>
      <div class="col visual-frame tight">
        <img src="assets/img/shannon-signal.png" alt="Forma d'onda ambra che si trasforma in pillole di token">
      </div>
    </div>
    <p class="sources"><strong>Fonti:</strong> Shannon (1948) <em>A Mathematical Theory of Communication</em>; Shannon (1951) <em>Prediction and Entropy of Printed English</em>.</p>
    <aside class="notes">
      Rendi esplicito il collegamento: un LLM è un enorme stimatore appreso della distribuzione del
      simbolo-successivo di Shannon. Tutto il resto è ingegneria costruita attorno a questa scommessa.
    </aside>
  </section>

        <p>La self-<strong>attention</strong> permette a ogni token di pesare ogni altro token in parallelo.</p>

  <section data-background-color="#f4f8fb">
    <h2>Tre livelli, una macchina</h2>
    <p class="lede">La predizione è il <em>substrato</em>, non il soffitto. L'errore è leggere un sistema al livello sbagliato.</p>
    <p class="footnote" style="font-style:italic;">&ldquo;A livello microscopico abbiamo i neuroni, a livello mesoscopico di mezzo abbiamo queste idee.&rdquo; &mdash; Nello Cristianini</p>

      </div>

      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-amber);">
          <h4><span class="chip safe">macro &middot; eso</span> Comportamento &amp; giudizio</h4>
          <p>Il sistema letto a un livello comportamentale, quasi psicologico (la stance di Dennett) &mdash; e il giudizio umano che lo governa.</p>
          <p class="mono-label">Relazionarsi: comprendere, contestare, sovrascrivere.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);">
          <h4><span class="chip around">meso &middot; meso</span> Concetti appresi &amp; competenza</h4>
          <p>Le idee astratte che il modello ha costruito da sé (il livello mesoscopico di Cristianini) &mdash; la sede di ragionamento, memoria, skill e strumenti.</p>
          <p class="mono-label">Relazionarsi: guidare con prosa, contesto e strumenti &mdash; è qui che lavori.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-cyan);">
          <h4><span class="chip inside">micro &middot; tropo</span> Substrato</h4>
          <p>Neuroni e pesi che calcolano le probabilità del prossimo token di Shannon. Sempre attivo, intrinsecamente statistico.</p>
          <p class="mono-label">Relazionarsi: conoscerne i modi di guasto &mdash; sampling, temperatura, allucinazione.</p>
        </div>
      </div>
    </div>
    <div class="takeaway">Tieni Shannon alla base. Fai il tuo pensiero &mdash; e la tua guida &mdash; al livello meso.</div>
    <p class="sources"><strong>Fonti:</strong>
      Cristianini (2024/2025), <em>Machina Sapiens</em> &amp; intervista (livelli micro / meso / macro della cognizione delle macchine);
      Marr (1982) livelli di analisi; Anderson (1972) <em>More Is Different</em>; Schaeffer et al. (2023) sulla sensibilità alla metrica dell'&ldquo;emergenza&rdquo;.
    </p>
    <aside class="notes">
      Cita il livello mesoscopico di Cristianini in un fiato, poi passa alla metafora dell'atmosfera.
      I suoi tre livelli: microscopico (neuroni/connessioni), mesoscopico (i concetti astratti che il
      modello ha appreso da sé, es. la feature "Golden Gate"), macroscopico (il comportamento letto
      quasi come una psicologia delle macchine, dove incontra Dennett). Proteggi il fianco: è
      un'affermazione sul giusto LIVELLO di descrizione (Marr), non che il modello sia diventato una
      mente. Schaeffer mostra che le "abilità emergenti" possono essere un artefatto della metrica -
      va bene, perché l'argomento riguarda il livello, non un interruttore magico. Ogni modulo da qui
      in poi risponde a: a quale livello siamo? Modulo 2 = substrato; Moduli 3-6 = sistema meso;
      Moduli 7-8 = comportamento macro e giudizio.
    </aside>
  </section>

</section>

  <section>
    <h2>Una sola operazione, ripetuta</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.82em;">
        <p>Un LLM calcola una distribuzione di probabilità sul prossimo token:</p>
        <p>$P(t_n \mid t_1, t_2, \dots, t_{n-1})$</p>
        <p><strong>Campiona</strong> un token, lo accoda, e ripete.</p>
        <div class="takeaway">La fluidità è un loop, non una consultazione.</div>
      </div>
      <div class="col visual-frame">
        <div class="prob-widget" data-next-token-widget>

          <div class="bar-list"></div>
        </div>
      </div>
    </div>
    <aside class="notes">
      Martella il loop. Allucinazione, creatività e fluidità derivano tutte dal campionare da una
      distribuzione. Anticipa la temperatura.

  <section data-background-color="#f4f8fb">
    <h2>Temperatura: la manopola del determinismo</h2>
    <div class="cols">
      <div class="col stack-sm" style="font-size:.8em;">
        <p>La temperatura rimodella la distribuzione prima del campionamento:</p>
        <ul>
          <li><strong>T bassa</strong>: netta, stabile, ripetitiva</li>
          <li><strong>T alta</strong>: più piatta, creativa, più rischiosa</li>
        </ul>
        <p>$p_i = \frac{e^{z_i/T}}{\sum_j e^{z_j/T}}$</p>
      </div>

        </div>
      </div>
    </div>

      Questo è il momento interattivo di alto valore: temperatura bassa contro alta sulla stessa
      distribuzione. Messaggio semplice: la casualità è un'impostazione, non una personalità.
    </aside>
  </section>

  <section>
    <h2>"Pappagallo stocastico" - una provocazione utile</h2>
    <div class="cols">
      <div class="col visual-frame tight" style="max-width:520px;">

<!-- ===== 03-architectures.html ===== -->
<section>

  <section class="module-cover" data-background-image="assets/img/module-03-architectures.png" data-background-size="cover" data-background-color="#fbfaf6">
    <span class="modnum">03</span>
    <p class="kicker">Modulo 3</p>
    <h1>Architetture</h1>
    <p class="lede">Due strati che la gente confonde: cosa sta <em>dentro</em> il modello vs. cosa è costruito <em>intorno</em>.</p>
    <aside class="notes">
      La correzione concettuale più importante di tutte: MoE ed embedding sono dentro il modello;
      gli agenti sono intorno. La maggior parte della confusione vive su questo confine.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2>Il confine</h2>
    <div class="cols">
      <div class="col visual-frame media-fit">
        <img src="assets/img/m03-boundary-motherboard.png" alt="Processore LLM montato su una scheda madre di memoria, strumenti e componenti di orchestrazione">
      </div>
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-cyan);">
          <h4>Dentro: il processore</h4>
          <p>Pesi, attention, embedding, router MoE e comportamenti addestrati vivono dentro il modello.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);">
          <h4>Intorno: l'impalcatura</h4>
          <p>Memoria, strumenti, retrieval, policy e loop instradano il lavoro intorno a un modello di solito congelato.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);">
          <h4>Il test</h4>
          <p>Se cambia i parametri, è dentro. Se fornisce contesto o azioni, è intorno.</p>
        </div>
      </div>
    </div>
    <div class="takeaway">Pensa all'LLM come al processore. Il sistema agentico è la scheda madre che collega memoria, strumenti e guardrail.</div>
    <aside class="notes">
      Dai il test concreto: cambia i pesi? MoE = sì, dentro. Un agente che chiama una calcolatrice
      = no, intorno. Questo schema governa il resto del modulo.
    </aside>
  </section>

  <section>
    <h2><span class="chip inside">3a</span> Come si costruisce un modello</h2>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m03-training-pipeline.png" alt="Infografica chiara a tre stadi: pretraining, fine-tuning supervisionato e preference tuning">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>1. Pretraining</strong><span>Predire token su corpora enormi. Costruisce i pattern linguistici e di mondo generali.</span></div>
        <div class="mini-card"><strong>2. Instruction tuning</strong><span>Gli esempi insegnano al modello a seguire compiti come assistente, non solo a continuare il testo.</span></div>
        <div class="mini-card"><strong>3. Preference tuning</strong><span>Il feedback umano o automatico spinge gli output verso comportamenti utili, innocui, verificabili.</span></div>
      </div>
    </div>
    <p class="footnote">Anche gli embedding vivono qui: modelli di embedding specializzati vengono poi usati per il retrieval.</p>
    <p class="sources"><strong>Fonti:</strong> Brown et al. (2020); Ouyang et al. (2022); Christiano et al. (2017).</p>
    <aside class="notes">
      I ricercatori non informatici spesso pensano che "il modello" sia una cosa addestrata una volta
      sola. Mostra la pipeline. Il comportamento da assistente viene per lo più dal post-training.
    </aside>
  </section>

  <section>
    <h2><span class="chip inside">3a</span> Attention &amp; Mixture-of-Experts</h2>
    <div class="cols top fit-two">
      <div class="col">
        <div class="visual-frame media-fit">
          <img src="assets/img/m03-attention.png" alt="Pillole di token collegate da archi puliti di self-attention">
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-cyan);margin-top:.45em;">
          <h4>Attention</h4>
          <p>Ogni token costruisce un riassunto pesato degli altri token nello stesso contesto.</p>
        </div>
      </div>
      <div class="col">
        <div class="visual-frame media-fit">
          <img src="assets/img/m03-moe.png" alt="Router Mixture-of-Experts che accende due blocchi esperti in una griglia">
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-amber);margin-top:.45em;">
          <h4>Mixture-of-Experts</h4>
          <p>Un router attiva un piccolo sottoinsieme di blocchi esperti, aumentando la capacità senza usare tutti i parametri a ogni token.</p>
        </div>
      </div>
    </div>
    <p class="sources"><strong>Fonti:</strong> Vaswani et al. (2017); Shazeer et al. (2017).</p>
    <aside class="notes">
      Sottolinea che MoE è un trucco interno di efficienza, non un agente né un comitato di modelli
      che parlano fra loro.
    </aside>
  </section>

  <section>
    <h2><span class="chip inside">3a</span> "Ragionamento" - due sensi</h2>
    <div class="cols">
      <div class="col stack-sm">
        <div class="signal-card" style="--card-accent:var(--ait-cyan);">
          <h4>Ragionamento addestrato</h4>
          <p>Il post-training cambia il sistema così che la deliberazione faccia parte del comportamento del modello.</p>
        </div>
        <div class="signal-card" style="--card-accent:var(--ait-violet);">
          <h4>Ragionamento via prompt</h4>
          <p>Un modello congelato viene avvolto con istruzioni, esempi o loop che gli chiedono di mostrare i passi.</p>
        </div>
      </div>
      <div class="col visual-frame">
        <div class="reason-widget" data-reason-widget>
          <div class="mode-buttons">
            <button type="button" data-mode="trained" aria-pressed="true">Addestrato</button>
            <button type="button" data-mode="prompted" aria-pressed="false">Via prompt</button>
          </div>
          <div class="reason-diagram" data-reason-diagram></div>
          <p class="reason-copy" data-reason-copy></p>
        </div>
      </div>
    </div>
    <div class="takeaway">Stesso comportamento in superficie, meccanismo diverso.</div>
    <p class="sources"><strong>Fonti:</strong> Wei et al. (2022); Nye et al. (2021).</p>
    <aside class="notes">
      Mantieni la disciplina dentro/intorno: il ragionamento addestrato è dentro, il ragionamento via
      prompt è una tecnica applicata dall'esterno.
    </aside>
  </section>

  <section data-background-color="#f4f8fb">
    <h2><span class="chip around">3b</span> Agenti = LLM + loop + strumenti + memoria</h2>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m03-agent-loop.png" alt="Processore LLM centrale avvolto da un loop agentico pulito di azioni, strumenti, memoria e osservazione">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>Loop</strong><span>Decidi cosa fare dopo, osserva il risultato, poi decidi di nuovo.</span></div>
        <div class="mini-card"><strong>Strumenti</strong><span>Azioni fuori dal modello: ricerca, file, codice, database, API.</span></div>
        <div class="mini-card"><strong>Memoria</strong><span>Stato fornito intorno al modello perché la chiamata successiva abbia contesto utile.</span></div>
      </div>
    </div>
    <p class="footnote">Pattern: ReAct, planning, reflection, orchestrazione multi-agente. Strumenti e memoria hanno moduli dedicati.</p>
    <p class="sources"><strong>Fonti:</strong> Yao et al. (2023) ReAct; Schick et al. (2023) Toolformer.</p>
    <aside class="notes">
      Fissa il punto: il salto da chatbot ad agente è per lo più impalcatura, non un modello più
      intelligente.
    </aside>
  </section>

</section>

<section>

  <section class="module-cover" data-background-image="assets/img/module-04-context-memory.png" data-background-size="cover" data-background-color="#fbfaf6">

    <h1>Contesto &amp; memoria</h1>

      persiste fra turni o sessioni. Sono ingegnerizzati in modo diverso.

  </section>

  <section>
    <h2>La finestra di contesto</h2>
    <p style="font-size:.8em;">Il contesto è la memoria di lavoro immediata del modello: ciò che è caricato per questa chiamata.</p>
    <div class="art-copy-layout">
      <div class="visual-frame media-fit">
        <img src="assets/img/m04-context-ram.png" alt="Finestra di contesto simile a una RAM con segmenti di token colorati caricati in slot di memoria immediata">
      </div>
      <div class="vertical-captions">
        <div class="mini-card"><strong>Sistema</strong><span>Regole e istruzioni di ruolo stanno in testa al working set.</span></div>

        <div class="mini-card"><strong>Spazio per la risposta</strong><span>Il modello ha bisogno di budget anche per produrre i prossimi token.</span></div>
      </div>
    </div>
    <div class="takeaway">Finestre più grandi aiutano, ma non sono gratis.</div>
    <aside class="notes">
